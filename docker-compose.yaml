services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cc-fastapi-app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-18000}:8000"
    environment:
      DATABASE_URL: "sqlite:///./data/cc_fastapi.db"
      POSTGRES_EXTERNAL_URL: "${POSTGRES_EXTERNAL_URL:-}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_DIR: "${LOG_DIR:-logs}"
      DEBUG_LOG_ENABLED: "${DEBUG_LOG_ENABLED:-true}"
      DEBUG_LOG_BACKUP_DAYS: "${DEBUG_LOG_BACKUP_DAYS:-14}"
      DEBUG_LOG_FILENAME: "${DEBUG_LOG_FILENAME:-debug.log}"
      DEBUG_LOG_UTC: "${DEBUG_LOG_UTC:-true}"
      QUEUES_CONFIG_PATH: "${QUEUES_CONFIG_PATH:-config/queues.yaml}"
      WORKER_CONCURRENCY: "${WORKER_CONCURRENCY:-1}"
      POLL_INTERVAL_MS: "${POLL_INTERVAL_MS:-1000}"
      QUEUE_TTL_HOURS: "${QUEUE_TTL_HOURS:-24}"
      RUNNING_TTL_HOURS: "${RUNNING_TTL_HOURS:-4}"
      MAX_ATTEMPTS: "${MAX_ATTEMPTS:-3}"
      CLAUDE_PERMISSION_MODE: "${CLAUDE_PERMISSION_MODE:-bypassPermissions}"
      CLAUDE_MAX_TURNS: "${CLAUDE_MAX_TURNS:-16}"
      CLAUDE_CWD: "${CLAUDE_CWD:-.}"
      CLAUDE_ALLOWED_TOOLS: "${CLAUDE_ALLOWED_TOOLS:-}"
      CLAUDE_DISALLOWED_TOOLS: "${CLAUDE_DISALLOWED_TOOLS:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL:-}"
      API_TIMEOUT_MS: "${API_TIMEOUT_MS:-3000000}"
      ANTHROPIC_DEFAULT_OPUS_MODEL: "${ANTHROPIC_DEFAULT_OPUS_MODEL:-}"
      ANTHROPIC_DEFAULT_SONNET_MODEL: "${ANTHROPIC_DEFAULT_SONNET_MODEL:-}"
      ANTHROPIC_DEFAULT_HAIKU_MODEL: "${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}"
      API_TOKEN: "${API_TOKEN:-}"
      GITLAB_WEBHOOK_SECRET: "${GITLAB_WEBHOOK_SECRET:-}"
      GITLAB_WEBHOOK_PROMPT_TEMPLATE_PATH: "${GITLAB_WEBHOOK_PROMPT_TEMPLATE_PATH:-}"
      GITLAB_WEBHOOK_QUEUE_NAME: "${GITLAB_WEBHOOK_QUEUE_NAME:-}"
    volumes:
      - app_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cc-agent-console
    ports:
      - "${FRONTEND_PORT:-18080}:80"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  app_data:
